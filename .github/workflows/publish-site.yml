name: Publish website

# Publishes the contents of the site/ folder to GitHub Pages.
# The site is plain static HTML, CSS, and JavaScript, so there is nothing to
# build. This workflow simply uploads the site/ folder and deploys it.

on:
  # Run when site files change on the main branch.
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/publish-site.yml"
  # Allow running it by hand from the Actions tab.
  workflow_dispatch:

# Permissions the deploy step needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Let one deployment finish before the next starts.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload the site folder
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
